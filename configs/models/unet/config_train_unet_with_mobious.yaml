model:
    debug_print_flag: False #Use 1 (True) to enable to look plots and logs and don't save files or 0 (False) to disable and save files with logs
    weight_fn: None #True #False #TOTEST

dataset:
    # github_data_path: "data/mobious/sample-frames/test3000x1700" 
    github_data_path: "data/mobious/sample-frames/test576x320"
    # github_data_path: "data/mobious/sample-frames/test640x400"
    # data_path: "datasets/mobious/MOBIOUS/train012per_0145" #LOCAL and SERVER paths
    # data_path: "datasets/mobious/MOBIOUS/train025per_0286" #LOCAL and SERVER paths
    # data_path: "datasets/mobious/MOBIOUS/train050per_0572" #LOCAL and SERVER paths
    data_path: "datasets/mobious/MOBIOUS/train100per_1144" #LOCAL and SERVER paths
    models_path: "datasets/ready/mobious/models" #LOCAL and SERVER paths
    checkpoint_path: "datasets/?" #TODO checkpoint_path
    use_github_data_path_flag : True # data_path = FULL_GITHUB_DATA_PATH if use_github_data_path_flag else FULL_DATA_PATH

transforms: # Transformations are defined in train_mobious.py using transforms.Compose()
    transform_operation: None # Options are 'transforms_img', 'transforms_rotations', None
    target_transform_operation: None # Options are 'transforms_img', 'transforms_rotations', None

datasets_splitting_ratios: # Ensure sum of all ratios = 1.
    train_set: 0.70
    validation_set : 0.15
    test_set : 0.15

pretrained_model: 
    models_path : "datasets/ready/mobious/models" # LOCAL and SERVER paths
    checkpoint_path : "datasets/?"
    model_name_for_eval : "weights_21-Jul-2025_15-05-30.pth" # weights_[date]_[time].pth .Please remember to add your own model.
    evaluation_with_pretrained_model_flag : False # Set to True to skip training and validation, and instead use a pretrained model for evaluation only. Load desired model using above variables
    # Set to False if you want to use the standard workflow: run training and validation, then perform evaluation.

model_hyperparameters:
    batch_size: 8 
    num_workers: 4
    epochs: 1
    learning_rate: 0.003
